<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#F2EFEB;font-family:var(--font-marketing);}
.hero{padding:56px 56px 48px;display:grid;grid-template-columns:1.35fr 1fr;gap:48px;align-items:center;min-height:320px;}
/* Sub-brand: Jokker Regular, -2% tracking, sits as its own subtitle — never locked up with the logo */
.subbrand{font-size:18px;font-weight:400;letter-spacing:-0.02em;color:#000;margin:0 0 18px;}
/* Hero tagline: title case, reads as a name — Plaud amplifies human intelligence */
h1{font-family:var(--font-marketing);font-size:68px;font-weight:400;letter-spacing:-0.025em;line-height:0.98;margin:0 0 20px;color:#000;}
h1 em{font-style:normal;color:var(--fg-3);}
p{font-size:15px;line-height:1.55;color:var(--fg-2);margin:0 0 28px;max-width:440px;}
.cta{display:inline-flex;align-items:center;gap:10px;background:#000;color:#fff;padding:0 22px;height:46px;border-radius:5px;font-weight:600;font-size:14px;font-family:var(--font-ui);}
.cta .arr{width:14px;height:1.5px;background:#fff;position:relative;}
.cta .arr::after{content:"";position:absolute;right:-1px;top:-3px;width:7px;height:7px;border-top:1.5px solid #fff;border-right:1.5px solid #fff;transform:rotate(45deg);}
.product{background:linear-gradient(135deg,#D9D9D9 0%,#F5F5F5 25%,#A8ADB3 55%,#E8E8E8 80%,#B8BCC0 100%);height:240px;border-radius:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,0.12);}
.device{width:74px;height:118px;background:linear-gradient(180deg,#2A2A2A 0%,#0A0A0A 50%,#1F1F1F 100%);border-radius:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.device .d{width:8px;height:8px;background:#00D0FF;border-radius:50%;box-shadow:0 0 0 4px rgba(0,208,255,0.22);}
</style></head>
<body>
<div class="hero">
  <div>
    <p class="subbrand">Plaud Note</p>
    <h1>Plaud amplifies<br/>human intelligence.</h1>
    <p>A pocket-sized AI recorder that turns meetings, lectures, and fleeting ideas into structured notes.</p>
    <a class="cta">Start recording<span class="arr"></span></a>
  </div>
  <div class="product"><div class="device"><div class="d"></div></div></div>
</div>
</body></html>
