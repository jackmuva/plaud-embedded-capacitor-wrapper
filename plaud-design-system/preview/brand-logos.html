<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F2EFEB;font-family:var(--font-sans);}
  .card{padding:24px 28px;display:grid;grid-template-columns:1fr 1px 1fr;gap:24px;min-height:260px;}
  .divider{background:rgba(0,0,0,0.15);height:100%;}
  .col{display:flex;flex-direction:column;gap:14px;}
  .frame{background:#fff;border:1px solid rgba(0,0,0,0.08);padding:28px 32px;display:flex;align-items:center;justify-content:center;min-height:110px;position:relative;}
  .frame img{height:32px;width:auto;}
  .frame .mark{height:64px;}
  .head{font-size:18px;font-weight:400;color:#000;margin:0;letter-spacing:-0.01em;}
  .body{font-size:12px;line-height:1.5;color:var(--fg-2);margin:0;}
  .meta{font-size:11px;color:var(--fg-3);}
  .bw{display:flex;gap:8px;}
  .bw .sq{width:38px;height:38px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
  .bw .sq.b{background:#000;}
  .bw .sq.w{background:#fff;border:1px solid rgba(0,0,0,0.12);}
  .bw .sq img{height:14px;filter:none;}
</style>
</head>
<body>
<div class="card">
  <div class="col">
    <div class="frame"><img src="../assets/logo-wordmark-black.png" alt="PLAUD logo"></div>
    <h3 class="head">Logo</h3>
    <p class="body">Our most recognized asset. Designed to work at large as well as smaller sizes. Only used in black or white.</p>
    <div class="meta">Minimum height · 15px / 1.5mm</div>
    <div class="bw">
      <div class="sq b"><img src="../assets/logo-wordmark-white.png" alt=""></div>
      <div class="sq w"><img src="../assets/logo-wordmark-black.png" alt=""></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="frame"><img class="mark" src="../assets/logo-mark-black.png" alt="Plaud icon"></div>
    <h3 class="head">Icon</h3>
    <p class="body">Shorthand of our logo. Use only when there is no space for the full logo — e.g. avatar or app icon.</p>
    <div class="meta">Minimum height · 15px / 1.5mm</div>
    <div class="bw">
      <div class="sq b"><img src="../assets/logo-mark-white.png" alt="" style="height:22px;"></div>
      <div class="sq w"><img src="../assets/logo-mark-black.png" alt="" style="height:22px;"></div>
    </div>
  </div>
</div>
</body>
</html>
