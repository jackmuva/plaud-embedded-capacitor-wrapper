<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-sans);}
  .card{padding:26px 32px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:110px;border-radius:10px;border:1px solid var(--stroke-1);}
  .name{font-size:13px;font-weight:600;color:var(--fg-1);}
  .hex{font-size:11px;color:var(--fg-3);}
  .role{font-size:11px;color:var(--fg-3);}
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="sw">
      <div class="chip" style="background:#21EF6A"></div>
      <div class="name">Amplify Green</div>
      <div class="hex">#21EF6A</div>
      <div class="role">AI accent · confirmations</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#00D0FF"></div>
      <div class="name">Clarity Blue</div>
      <div class="hex">#00D0FF</div>
      <div class="role">AI accent · info states</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#8F53ED"></div>
      <div class="name">Victory Purple</div>
      <div class="hex">#8F53ED</div>
      <div class="role">AI accent · premium tier</div>
    </div>
  </div>
</div>
</body>
</html>
