<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:22px 28px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .tile{height:170px;border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--stroke-1);}
  .metallic{background:linear-gradient(135deg, #D9D9D9 0%, #F5F5F5 25%, #A8ADB3 55%, #E8E8E8 80%, #B8BCC0 100%);}
  .chrome{background:linear-gradient(180deg, #2A2A2A 0%, #0A0A0A 50%, #1F1F1F 100%);color:#fff;}
  .ivory{background:linear-gradient(180deg, #FAF8F3 0%, #EAE6DE 100%);}
  .protect{background:linear-gradient(180deg, #888 0%, #444 100%);position:relative;color:#fff;overflow:hidden;}
  .protect::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%);}
  .label{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;position:relative;z-index:2;}
  .meta{font-size:11px;font-family:var(--font-mono);opacity:0.7;position:relative;z-index:2;}
</style>
</head>
<body>
<div class="card">
  <div class="tile metallic"><div class="label">Metallic</div><div class="meta">--grad-metallic</div></div>
  <div class="tile chrome"><div class="label">Chrome</div><div class="meta">--grad-chrome</div></div>
  <div class="tile ivory"><div class="label">Ivory</div><div class="meta">--grad-ivory</div></div>
  <div class="tile protect"><div class="label">Protection</div><div class="meta">--grad-protect (overlay)</div></div>
</div>
</body>
</html>
