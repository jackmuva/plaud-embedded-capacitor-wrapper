<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:22px 28px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:70px;border-radius:8px;border:1px solid var(--stroke-1);}
  .name{font-size:12px;font-weight:600;color:var(--fg-1);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
  .title{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-3);font-weight:600;margin-bottom:4px;}
  .desc{font-size:12px;color:var(--fg-3);margin-bottom:14px;}
</style>
</head>
<body>
<div class="card">
  <div class="title">Graphite Scale</div>
  <div class="desc">Cool metallic greys — brushed-aluminum tone. Use on chrome UI, hardware-adjacent surfaces.</div>
  <div class="grid" style="grid-template-columns:repeat(8,1fr);">
    <div class="sw"><div class="chip" style="background:#141414"></div><div class="name">900</div><div class="hex">#141414</div></div>
    <div class="sw"><div class="chip" style="background:#1F1F1F"></div><div class="name">800</div><div class="hex">#1F1F1F</div></div>
    <div class="sw"><div class="chip" style="background:#2A2A2A"></div><div class="name">700</div><div class="hex">#2A2A2A</div></div>
    <div class="sw"><div class="chip" style="background:#6E6E6E"></div><div class="name">500</div><div class="hex">#6E6E6E</div></div>
    <div class="sw"><div class="chip" style="background:#9A9A9A"></div><div class="name">400</div><div class="hex">#9A9A9A</div></div>
    <div class="sw"><div class="chip" style="background:#C7C7C7"></div><div class="name">300</div><div class="hex">#C7C7C7</div></div>
    <div class="sw"><div class="chip" style="background:#E1E1E1"></div><div class="name">200</div><div class="hex">#E1E1E1</div></div>
    <div class="sw"><div class="chip" style="background:#F0F0F0"></div><div class="name">100</div><div class="hex">#F0F0F0</div></div>
  </div>
</div>
</body>
</html>
