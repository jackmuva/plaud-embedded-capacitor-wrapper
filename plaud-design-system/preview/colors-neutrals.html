<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-sans);}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:18px;}
  .group{display:flex;flex-direction:column;gap:10px;}
  .label{font-size:11px;font-weight:600;color:var(--fg-2);letter-spacing:0.02em;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:72px;border-radius:8px;border:1px solid var(--stroke-1);}
  .name{font-size:12px;font-weight:600;color:var(--fg-1);}
  .hex{font-size:10px;color:var(--fg-3);}
  .ai{height:72px;border-radius:8px;background:linear-gradient(90deg,#21EF6A 0%,#2CA3FF 50%,#8F53ED 100%);}
  .airow{display:grid;grid-template-columns:1fr;gap:6px;}
  .aisub{display:flex;justify-content:space-between;font-size:10px;color:var(--fg-3);}
</style>
</head>
<body>
<div class="card">
  <div class="group">
    <div class="label">Neutral core</div>
    <div class="row">
      <div class="sw"><div class="chip" style="background:#000000"></div><div class="name">Black</div><div class="hex">#000000</div></div>
      <div class="sw"><div class="chip" style="background:#413D3B"></div><div class="name">Dark warm grey</div><div class="hex">#413D3B</div></div>
      <div class="sw"><div class="chip" style="background:#F2EFEB"></div><div class="name">Light warm grey</div><div class="hex">#F2EFEB</div></div>
      <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Solid highlights</div>
    <div class="row" style="grid-template-columns:repeat(3,1fr);">
      <div class="sw"><div class="chip" style="background:#21EF6A"></div><div class="name">Amplify Green</div><div class="hex">#21EF6A</div></div>
      <div class="sw"><div class="chip" style="background:#00D0FF"></div><div class="name">Clarity Blue</div><div class="hex">#00D0FF</div></div>
      <div class="sw"><div class="chip" style="background:#8F53ED"></div><div class="name">Victory Purple</div><div class="hex">#8F53ED</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">AI gradient — for AI-related features</div>
    <div class="airow">
      <div class="ai"></div>
      <div class="aisub"><span>0% · #21EF6A Amplify Green</span><span>50% · #2CA3FF Clarity Blue</span><span>100% · #8F53ED Victory Purple</span></div>
    </div>
  </div>
</div>
</body>
</html>
