<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-1);font-family:var(--font-sans);}
.card{padding:24px 32px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.pill{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 10px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:0.02em;}
.rec{background:#00D0FF;color:#000;}
.rec .d{width:6px;height:6px;border-radius:50%;background:#000;}
.live{background:rgba(0,208,255,0.12);color:#0B6F89;}
.live .d{width:6px;height:6px;border-radius:50%;background:#00D0FF;}
.ok{background:rgba(33,239,106,0.18);color:#0F7A36;}
.warn{background:#FBF1D8;color:#8B6914;}
.neutral{background:#F0F0F0;color:#2A2A2A;}
.ai{background:linear-gradient(90deg,#21EF6A 0%,#2CA3FF 50%,#8F53ED 100%);color:#fff;}
.pro{background:#000;color:#fff;}
.dash{border:1px dashed rgba(0,0,0,0.2);background:transparent;color:var(--fg-3);}
</style></head>
<body>
<div class="card">
  <span class="pill rec"><span class="d"></span>REC</span>
  <span class="pill live"><span class="d"></span>Live transcribing</span>
  <span class="pill ok">Summary ready</span>
  <span class="pill warn">Syncing · 42%</span>
  <span class="pill neutral">Draft</span>
  <span class="pill ai">Ask AI</span>
  <span class="pill pro">Pro</span>
  <span class="pill dash">Pending upload</span>
  <span class="pill neutral">EN · ES · JA</span>
</div>
</body></html>
