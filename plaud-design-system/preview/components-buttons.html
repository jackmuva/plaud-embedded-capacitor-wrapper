<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-1);font-family:var(--font-sans);}
.card{padding:28px 32px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
.btn{font-family:inherit;font-weight:600;font-size:14px;border-radius:5px;padding:0 20px;height:44px;cursor:pointer;border:1px solid transparent;transition:all 200ms cubic-bezier(0.22,0.61,0.36,1);display:inline-flex;align-items:center;gap:8px;}
.primary{background:#000;color:#fff;}
.primary:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,0.18);}
.secondary{background:#fff;color:#000;border-color:#000;}
.secondary:hover{background:#F2EFEB;}
.ghost{background:transparent;color:#000;border-color:transparent;}
.ghost:hover{text-decoration:underline;}
.ai{background:linear-gradient(90deg,#21EF6A 0%,#2CA3FF 50%,#8F53ED 100%);color:#fff;}
.sm{height:36px;padding:0 16px;font-size:13px;}
.lg{height:52px;padding:0 28px;font-size:15px;}
.disabled{opacity:0.4;pointer-events:none;}
.label{display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:0.02em;background:#F2EFEB;color:#000;}
.label.dark{background:#000;color:#fff;}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;width:100%;}
</style></head>
<body>
<div class="card">
  <div class="row">
    <button class="btn primary">Start recording</button>
    <button class="btn secondary">Open transcript</button>
    <button class="btn ghost">Skip</button>
    <button class="btn ai">✦ Ask AI</button>
  </div>
  <div class="row">
    <button class="btn primary sm">Export</button>
    <button class="btn primary">Default</button>
    <button class="btn primary lg">Get Plaud Note</button>
    <button class="btn primary disabled">Disabled</button>
  </div>
  <div class="row">
    <span class="label">New</span>
    <span class="label dark">Pro</span>
    <span class="label">Meeting</span>
    <span class="label">EN · ES · JA</span>
  </div>
</div>
</body></html>
