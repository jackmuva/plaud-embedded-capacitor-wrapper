<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#FAFAFA;}
.wrap{padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:5px;padding:18px;display:flex;flex-direction:column;gap:10px;font-family:var(--font-ui);}
.row{display:flex;align-items:center;gap:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:#21EF6A;box-shadow:0 0 0 4px rgba(33,239,106,0.22);}
.title{font-size:15px;font-weight:600;color:#000;letter-spacing:-0.01em;}
.meta{font-size:12px;color:var(--fg-3);font-family:var(--font-ui);font-variant-numeric:tabular-nums;}
.body{font-size:13px;color:var(--fg-2);line-height:1.5;}
.wf{display:flex;align-items:center;gap:3px;height:28px;}
.wf span{display:block;width:3px;background:#000;border-radius:2px;}
.foot{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--fg-3);}
.badge{font-size:10px;color:var(--fg-3);letter-spacing:0.04em;}
</style></head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row"><div class="dot"></div><div class="title">Live · Leadership sync</div></div>
    <div class="meta">REC · 00:14:22</div>
    <div class="wf">
      <span style="height:30%"></span><span style="height:60%"></span><span style="height:45%"></span>
      <span style="height:90%"></span><span style="height:55%"></span><span style="height:70%"></span>
      <span style="height:40%"></span><span style="height:80%"></span><span style="height:50%"></span>
      <span style="height:65%"></span><span style="height:35%"></span><span style="height:75%"></span>
    </div>
    <div class="foot"><span>Plaud Note · 2.4m away</span><span>EN</span></div>
    <div class="badge">Product UI — Inter</div>
  </div>
  <div class="card">
    <div class="title">Q2 planning — leadership</div>
    <div class="meta">Yesterday · 42:18 · 6 speakers</div>
    <div class="body">Aligned on three H1 goals. Team expansion deferred to Q3 pending revenue milestone …</div>
    <div class="foot"><span>Summarized</span><span>Transcript →</span></div>
    <div class="badge">Product UI — Inter</div>
  </div>
</div>
</body></html>
