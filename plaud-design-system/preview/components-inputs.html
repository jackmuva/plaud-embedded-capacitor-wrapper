<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-1);font-family:var(--font-sans);}
.card{padding:24px 32px;display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.group{display:flex;flex-direction:column;gap:6px;}
.label{font-size:11px;font-weight:600;color:var(--fg-2);letter-spacing:0.02em;}
.input{height:44px;border:1px solid rgba(0,0,0,0.14);border-radius:4px;padding:0 14px;font-family:inherit;font-size:14px;background:#fff;transition:border 200ms;}
.input:focus{outline:2px solid #000;outline-offset:2px;border-color:#000;}
.help{font-size:11px;color:var(--fg-3);}
.chip{display:inline-flex;align-items:center;height:28px;padding:0 12px;border-radius:5px;background:#F2EFEB;color:#000;font-size:12px;font-weight:500;border:1px solid rgba(0,0,0,0.08);}
.chip.active{background:#000;color:#fff;border-color:#000;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
</style></head>
<body>
<div class="card">
  <div class="group">
    <div class="label">Recording title</div>
    <input class="input" value="Q2 planning — leadership" />
    <div class="help">Rename anytime. Used across search and exports.</div>
  </div>
  <div class="group">
    <div class="label">Language</div>
    <input class="input" placeholder="English (US)" />
    <div class="chips" style="margin-top:6px;">
      <span class="chip active">All</span>
      <span class="chip">Meeting</span>
      <span class="chip">Lecture</span>
      <span class="chip">Voice memo</span>
    </div>
  </div>
</div>
</body></html>
