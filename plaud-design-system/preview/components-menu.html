<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-1);}
.card{padding:26px 32px;display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:center;}
.panel{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:6px;display:flex;flex-direction:column;}
.panel.dark{background:#141414;border-color:rgba(255,255,255,0.08);}
.item{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:13px;color:var(--fg-2);border-radius:6px;font-family:var(--font-sans);}
.item.active{background:#F0F0F0;color:#000;font-weight:600;}
.panel.dark .item{color:#C7C7C7;}
.panel.dark .item.active{background:rgba(255,255,255,0.08);color:#fff;}
.dot{width:6px;height:6px;border-radius:50%;background:#FF4A1C;}
.sep{height:1px;background:rgba(0,0,0,0.08);margin:6px 4px;}
.panel.dark .sep{background:rgba(255,255,255,0.08);}
</style></head>
<body>
<div class="card">
  <div class="panel">
    <div class="item active">All recordings</div>
    <div class="item">Meetings</div>
    <div class="item">Lectures</div>
    <div class="item">Voice memos</div>
    <div class="sep"></div>
    <div class="item"><span class="dot"></span>Live now</div>
    <div class="item">Archive</div>
  </div>
  <div class="panel dark">
    <div class="item active">All recordings</div>
    <div class="item">Meetings</div>
    <div class="item">Lectures</div>
    <div class="item">Voice memos</div>
    <div class="sep"></div>
    <div class="item"><span class="dot"></span>Live now</div>
    <div class="item">Archive</div>
  </div>
</div>
</body></html>
