<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-1);font-family:var(--font-sans);}
.card{padding:26px 32px;display:flex;flex-direction:column;gap:18px;}
.note{font-size:12px;color:var(--fg-2);line-height:1.5;}
.note b{color:#000;font-weight:600;}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.item{display:flex;flex-direction:column;gap:8px;}
.box{height:80px;background:#F2EFEB;border:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;color:var(--fg-3);font-size:11px;}
.btn{height:44px;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;}
.img{height:80px;background:linear-gradient(135deg,#D9D9D9 0%,#F5F5F5 40%,#B8BCC0 100%);}
.nm{font-size:12px;font-weight:600;color:#000;}
.label{font-size:11px;color:var(--fg-3);}
</style></head>
<body>
<div class="card">
  <div class="note"><b>5px</b> is the standard corner radius for all <b>images</b> and <b>buttons</b>. Use the same value across surfaces for visual consistency.</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:5px">Surface</div><div class="nm">Default</div><div class="label">5px · cards, panels</div></div>
    <div class="item"><div class="btn" style="border-radius:5px">Start recording</div><div class="nm">Button</div><div class="label">5px</div></div>
    <div class="item"><div class="img" style="border-radius:5px"></div><div class="nm">Image</div><div class="label">5px</div></div>
    <div class="item"><div class="box" style="border-radius:0;background:#fff;border-top:1px solid #000;border-bottom:1px solid #000;">Editorial</div><div class="nm">None</div><div class="label">0 · dividers, rules</div></div>
  </div>
</div>
</body></html>
