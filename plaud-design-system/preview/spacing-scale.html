<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-1);}
.card{padding:22px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:end;}
.item{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{background:#000;width:100%;}
.label{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
.nm{font-size:11px;font-weight:600;color:var(--fg-1);}
</style></head>
<body>
<div class="card">
  <div class="item"><div class="bar" style="height:4px"></div><div class="nm">1</div><div class="label">4px</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="nm">2</div><div class="label">8px</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="nm">3</div><div class="label">12px</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="nm">4</div><div class="label">16px</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="nm">6</div><div class="label">24px</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="nm">8</div><div class="label">32px</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="nm">12</div><div class="label">48px</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="nm">16</div><div class="label">64px</div></div>
</div>
</body></html>
