<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#FAFAFA;font-family:var(--font-sans);}
.card{padding:32px;display:flex;justify-content:center;align-items:center;}
.tile{width:260px;height:120px;background:#fff;border-radius:5px;display:flex;flex-direction:column;justify-content:center;padding:18px;gap:6px;box-shadow:0 2px 6px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.04);}
.nm{font-size:14px;font-weight:600;color:#000;}
.label{font-size:11px;color:var(--fg-3);}
</style></head>
<body>
<div class="card">
  <div class="tile">
    <div class="nm">SM — Standard shadow</div>
    <div class="label">0 2px 6px rgba(0,0,0,0.05) + 1px hairline</div>
    <div class="label">Cards, panels, lifted surfaces</div>
  </div>
</div>
</body></html>
