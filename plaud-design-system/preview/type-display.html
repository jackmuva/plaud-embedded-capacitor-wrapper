<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jokker — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:6px;}
  .label{font-size:10px;letter-spacing:var(--tracking-overline);text-transform:uppercase;color:var(--fg-3);font-weight:600;}
  .specimen{font-family:var(--font-sans);font-weight:400;letter-spacing:-0.02em;line-height:1;color:var(--fg-1);}
  .meta{font-size:11px;color:var(--fg-3);font-family:var(--font-mono);}
  .row{display:flex;align-items:baseline;gap:16px;border-top:1px solid var(--stroke-1);padding-top:12px;}
  .row:first-of-type{border-top:none;padding-top:0;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="specimen" style="font-size:72px;">Remember everything.</div></div>
  <div class="row">
    <div style="flex:1"><div class="specimen" style="font-size:48px;">Capture every word.</div></div>
    <div class="meta">Jokker Regular · 48 / 52 · -0.02em</div>
  </div>
  <div class="row">
    <div style="flex:1"><div class="specimen" style="font-size:32px;">Your pocket AI recorder.</div></div>
    <div class="meta">Jokker Regular · 32 / 38</div>
  </div>
</div>
</body>
</html>
