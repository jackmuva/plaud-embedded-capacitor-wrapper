<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jokker — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:24px 32px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:20px;border-top:1px solid var(--stroke-1);padding-top:14px;}
  .row:first-of-type{border-top:none;padding-top:0;}
  .spec{flex:1;font-family:var(--font-sans);font-weight:600;color:var(--fg-1);line-height:1.15;letter-spacing:-0.01em;}
  .meta{font-size:11px;color:var(--fg-3);font-family:var(--font-mono);white-space:nowrap;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="spec" style="font-size:40px;">A pocket-sized AI recorder.</div><div class="meta">H1 · 40 / 46 · 600</div></div>
  <div class="row"><div class="spec" style="font-size:32px;">Transcripts, summarized.</div><div class="meta">H2 · 32 / 38 · 600</div></div>
  <div class="row"><div class="spec" style="font-size:24px;">Auto-summary, speaker labels.</div><div class="meta">H3 · 24 / 30 · 600</div></div>
  <div class="row"><div class="spec" style="font-size:20px;">Meeting highlights</div><div class="meta">H4 · 20 / 26 · 600</div></div>
</div>
</body>
</html>
